spring:
  application:
    name: compliance-platform
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/compliance}
    username: ${DATABASE_USER:compliance}
    password: ${DATABASE_PASSWORD:compliance}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-openssl-rand-hex-64-minimum}
    access-token-expiry-minutes: ${JWT_ACCESS_EXPIRY:30}
    refresh-token-expiry-days: ${JWT_REFRESH_EXPIRY:7}
  ai-service:
    base-url: ${AI_SERVICE_URL:http://localhost:8000}
  storage:
    local-path: ${STORAGE_PATH:./storage}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.compliance: ${LOG_LEVEL:INFO}
  pattern:
    console: "%d{ISO8601} [%thread] %-5level %logger{36} - %msg%n"

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
